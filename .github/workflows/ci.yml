name: CI

on:
  pull_request:
    branches: [develop, qa, production]
  push:
    branches: [develop, qa, production]

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format -- --check

      - name: Type check
        run: npx tsc --noEmit

      - name: Build application
        run: npm run build
